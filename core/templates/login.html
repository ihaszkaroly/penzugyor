<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Bejelentkezés - Pénzügyőr</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow-sm" style="width: 400px;">
        <div class="card-body">
            <h3 class="card-title text-center mb-4">Bejelentkezés</h3>

            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}

                <button type="submit" class="btn btn-success w-100 fw-bold mt-2">Belépés</button>
            </form>

            <p class="text-center mt-3">Nincs még fiókod? <a href="{% url 'register' %}">Regisztrálj!</a></p>
        </div>
    </div>
</body>
</html>
