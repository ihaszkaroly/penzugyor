<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Regisztráció - Pénzügyőr</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow-sm" style="width: 400px;">
        <div class="card-body">
            <h3 class="card-title text-center mb-4">Regisztráció</h3>

            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="form-check text-start mb-3 mt-3">
                <input class="form-check-input" type="checkbox" value="" id="adatkezeles" required>
                    <label class="form-check-label" for="adatkezeles" style="font-size: 0.9em;">
                        Elolvastam és elfogadom az <a href="#">Adatkezelési tájékoztatót</a>.
                    </label>
                </div>

                <button type="submit" class="btn btn-primary w-100 fw-bold mt-2">Fiók létrehozása</button>
            </form>

            <p class="text-center mt-3">Már van fiókod? <a href="{% url 'login' %}">Lépj be itt!</a></p>
        </div>
    </div>
</body>
</html>
