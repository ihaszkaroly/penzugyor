<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Új tétel rögzítése</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 600px;">
    <h2 class="mb-4">Új tranzakció rögzítése</h2>
    <div class="card shadow-sm">
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-bold">Összeg (Ft)</label>
                    <input type="number" name="amount" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Kategória</label>
                    <select name="category_id" class="form-select" required>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }} ({{ cat.get_type_display }})</option>
                        {% empty %}
                        <option value="">Még nincs kategóriád! Hozz létre egyet alább!</option>
                        {% endfor %}
                    </select>

                    <div class="mt-2 text-end">
                        <a href="{% url 'add_category' %}" class="text-decoration-none text-primary fw-bold">+ Új kategória létrehozása</a>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Dátum</label>
                    <input type="date" name="date" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Megjegyzés (pl. Tesco, Tankolás)</label>
                    <input type="text" name="description" class="form-control">
                </div>

                <button type="submit" class="btn btn-success w-100 fw-bold">Mentés</button>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary w-100 mt-2">Mégse</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
